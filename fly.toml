# fly.toml app configuration file generated for api-compras-americanas on 2026-04-02T15:19:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "api-compras-americanas"
primary_region = "gru"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# Define que o serviço HTTP roda o processo "web"
processes = ["web"]

# Processo web (servidor HTTP sem cron)
[[processes]]
name = "web"
command = "npm run start"  # seu script padrão, que não roda cron

# Processo worker (cron) — roda apenas o scheduler
[[processes]]
name = "worker"
command = "npm run start-cron" # script que só roda o cron (startScheduler)

# Configuração das máquinas para cada processo

[[vm]]
name = "web-vm"
memory = "1gb"
cpu_kind = "shared"
cpus = 1
memory_mb = 512
processes = ["web"]

[[vm]]
name = "worker-vm"
memory = "1gb"
cpu_kind = "shared"
cpus = 1
memory_mb = 512
processes = ["worker"]
